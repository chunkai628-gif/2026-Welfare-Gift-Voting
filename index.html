<h1>福委會年度禮品投票</h1>

<div class="subtitle">
Welfare Committee Annual Gift Voting
<br><br>
截止時間 / Deadline:
<br>
2026/05/18 12:00 PM (GMT+8)
</div>

<form id="voteForm">

<label>姓名 / Name</label>
<input type="text" id="name" required>

<label>Email</label>
<input type="email" id="email" required>

<label>工號 / Employee ID</label>
<input type="text" id="employeeId" required>

<label>禮物選項 / Gift Option</label>
<div class="option">
<input type="radio"
       name="gift"
       value="Option A: 開運發財金 Fortune Gold Coin"
       required>

Option A: 開運發財金 Fortune Gold Coin
</div>

<div class="option">
<input type="radio"
       name="gift"
       value="Option B: 肩頸按摩器 Shoulder & Neck Massager">

Option B: 肩頸按摩器 Shoulder & Neck Massager
</div>
<button type="submit" id="submitBtn">
送出投票 / Submit Vote
</button>

</form>

<div class="result">
<h3>即時投票結果 / Live Voting Result</h3>
<div id="resultText">Loading...</div>
</div>

<div class="footer">
每位員工限一票，可於截止前更新。<br>
One vote per employee. Updates allowed before deadline.
</div>

</div>

<script>

const ENDPOINT_URL = 'https://script.google.com/macros/s/AKfycbzTD-G_vQUbZLi4_pEYbAbYL__ifGWidhaZDd1TZyTYtBuYDDM__JKPAAJTAXAvSTwX/exec';

document.getElementById('voteForm').addEventListener('submit', async function(e){
    e.preventDefault();

    const btn = document.getElementById('submitBtn');
    btn.disabled = true;

    const payload = {
        name: document.getElementById('name').value,
        email: document.getElementById('email').value,
        employeeId: document.getElementById('employeeId').value,
        gift: document.querySelector('input[name="gift"]:checked').value
    };

    try {

        const response = await fetch(ENDPOINT_URL,{
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify(payload)
        });

        const result = await response.json();

        alert(result.message);

        loadResult();

    } catch(err) {
        alert('System Error: ' + err);
    }

    btn.disabled = false;
});

async function loadResult() {

    try {

        const response = await fetch(ENDPOINT_URL);
        const data = await response.json();

        document.getElementById('resultText').innerHTML =
        `
        Option A 開運發財金 Fortune Gold Coin：<b>${data.optionA}</b> 票
        <br><br>
        Option B 肩頸按摩器 Shoulder & Neck Massager：<b>${data.optionB}</b> 票
        `;

    } catch(err) {
        document.getElementById('resultText').innerText='Unable to load results';
    }
}

loadResult();

</script>
