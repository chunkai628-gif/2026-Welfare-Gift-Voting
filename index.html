<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Synaptics Gift Voting</title>
<style>
body{font-family:Arial;background:#f4f6fb;margin:0;padding:20px}
.container{max-width:700px;margin:auto;background:white;padding:30px;border-radius:20px;box-shadow:0 4px 18px rgba(0,0,0,.1)}
.logo{text-align:center}
.logo img{max-width:320px;width:100%}
h1{text-align:center}
.subtitle{text-align:center;color:#555;margin-bottom:20px}
label{display:block;margin-top:15px;font-weight:bold}
input[type=text],input[type=email]{width:100%;padding:12px;border-radius:10px;border:1px solid #ccc;box-sizing:border-box}
.option{padding:12px;border:1px solid #ddd;border-radius:10px;margin-top:10px}
button{width:100%;padding:14px;background:#2563eb;color:white;border:none;border-radius:12px;font-size:16px;margin-top:24px}
.result{background:#f3f4f6;padding:18px;border-radius:12px;margin-top:30px}
.footer{margin-top:20px;text-align:center;color:#666;font-size:13px}
</style>
</head>
<body>
<div class="container">

<div class="logo">
<img src="synaptics-logo-full-color (1).png">
</div>

<h1>福委會年度禮品投票</h1>

<div class="subtitle">
Welfare Committee Annual Gift Voting
<br><br>
截止時間 / Deadline:
<br>
2026/05/18 12:00 PM (GMT+8)
</div>

<form id="voteForm">

<label>姓名 / Name</label>
<input type="text" id="name" required>

<label>Email</label>
<input type="email" id="email" required>

<label>工號 / Employee ID</label>
<input type="text" id="employeeId" required>

<label>禮物選項 / Gift Option</label>

<div class="option">
<input type="radio" name="gift" value="Option A: 開運金豆" required>
Option A: 開運金豆
</div>

<div class="option">
<input type="radio" name="gift" value="Option B: 肩頸按摩器">
Option B: 肩頸按摩器
</div>

<button type="submit" id="submitBtn">
送出投票 / Submit Vote
</button>

</form>

<div class="result">
<h3>即時投票結果 / Live Voting Result</h3>
<div id="resultText">Loading...</div>
</div>

<div class="footer">
每位員工限一票，可於截止前更新。<br>
One vote per employee. Updates allowed before deadline.
</div>

</div>

<script>

const ENDPOINT_URL = 'PASTE_YOUR_GOOGLE_APPS_SCRIPT_URL_HERE';

document.getElementById('voteForm').addEventListener('submit', async function(e){
    e.preventDefault();

    const btn = document.getElementById('submitBtn');
    btn.disabled = true;

    const payload = {
        name: document.getElementById('name').value,
        email: document.getElementById('email').value,
        employeeId: document.getElementById('employeeId').value,
        gift: document.querySelector('input[name="gift"]:checked').value
    };

    try {

        const response = await fetch(ENDPOINT_URL,{
            method:'POST',
            headers:{'Content-Type':'application/json'},
            body:JSON.stringify(payload)
        });

        const result = await response.json();

        alert(result.message);

        loadResult();

    } catch(err) {
        alert('System Error: ' + err);
    }

    btn.disabled = false;
});

async function loadResult() {

    try {

        const response = await fetch(ENDPOINT_URL);
        const data = await response.json();

        document.getElementById('resultText').innerHTML =
        `
        Option A 開運金豆：<b>${data.optionA}</b> 票
        <br><br>
        Option B 肩頸按摩器：<b>${data.optionB}</b> 票
        `;

    } catch(err) {
        document.getElementById('resultText').innerText='Unable to load results';
    }
}

loadResult();

</script>

</body>
</html>
